{% extends "base.html" %}

{% block title %}编辑公告 - {{ announcement.title }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <!-- 侧边栏 (与 admin 其他页面保持一致) -->
        <div class="col-lg-2 mb-4">
            <div class="list-group shadow">
                <a href="{{ url_for('admin.dashboard') }}" class="list-group-item list-group-item-action">
                    <i class="bi bi-speedometer2 me-2"></i>仪表盘
                </a>
                <a href="{{ url_for('admin.users') }}" class="list-group-item list-group-item-action">
                    <i class="bi bi-people me-2"></i>用户管理
                </a>
                <a href="{{ url_for('admin.admin_rewards') }}" class="list-group-item list-group-item-action">
                    <i class="bi bi-cash-coin me-2"></i>悬赏令
                </a>
                <a href="{{ url_for('admin.admin_clues') }}" class="list-group-item list-group-item-action">
                    <i class="bi bi-file-earmark-text me-2"></i>线索管理
                </a>
                <a href="{{ url_for('admin.admin_hazards') }}" class="list-group-item list-group-item-action">
                    <i class="bi bi-exclamation-triangle me-2"></i>隐患管理
                </a>
                <a href="{{ url_for('admin.admin_tasks') }}" class="list-group-item list-group-item-action">
                    <i class="bi bi-list-check me-2"></i>任务管理
                </a>
                <a href="{{ url_for('admin.emergency_dispatch') }}" class="list-group-item list-group-item-action">
                    <i class="bi bi-broadcast me-2"></i>应急调度
                </a>
                <a href="{{ url_for('admin.admin_announcements') }}" class="list-group-item list-group-item-action active">
                    <i class="bi bi-megaphone me-2"></i>公告管理
                </a>
                <a href="{{ url_for('admin.reward_items') }}" class="list-group-item list-group-item-action">
                    <i class="bi bi-gift me-2"></i>积分商城
                </a>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="col-lg-10">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3><i class="bi bi-pencil-square me-2"></i>编辑公告</h3>
                <a href="{{ url_for('admin.admin_announcements') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>返回列表
                </a>
            </div>

            <div class="card shadow">
                <div class="card-body p-4">
                    <form method="POST" action="{{ url_for('admin.edit_announcement', id=announcement.id) }}">
                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label">公告标题</label>
                                <input type="text" class="form-control" name="title" value="{{ announcement.title }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">分类</label>
                                <select class="form-select" name="category">
                                    <option value="notice" {% if announcement.category == 'notice' %}selected{% endif %}>通知</option>
                                    <option value="news" {% if announcement.category == 'news' %}selected{% endif %}>新闻</option>
                                    <option value="safety" {% if announcement.category == 'safety' %}selected{% endif %}>安全提示</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">公告内容</label>
                            <textarea class="form-control" name="content" rows="10" required>{{ announcement.content }}</textarea>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">封面图片路径</label>
                                <input type="text" class="form-control" name="cover_image" value="{{ announcement.cover_image or '' }}">
                            </div>
                            <div class="col-md-6">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" name="is_pinned" id="is_pinned" {% if announcement.is_pinned %}checked{% endif %}>
                                    <label class="form-check-label" for="is_pinned">
                                        置顶公告
                                    </label>
                                </div>
                            </div>
                        </div>

                        <hr>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="submit" class="btn btn-primary btn-lg px-5">
                                <i class="bi bi-check-circle me-2"></i>保存修改
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
